name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via SFTP
        run: |
          sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USER }}","${{ secrets.FTP_PASSWORD }}" sftp://${{ secrets.FTP_HOST }} << 'EOF'
          set sftp:auto-confirm yes
          set net:timeout 30
          mirror --reverse --delete --verbose ./dist/ /public_html/
          quit
          EOF
