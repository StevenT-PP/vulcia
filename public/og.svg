<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080810"/>
      <stop offset="100%" stop-color="#0d0d1a"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cfc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <radialGradient id="glow" cx="30%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#7c5cfc" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#080810" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Grid lines -->
  <g stroke="rgba(124,92,252,0.07)" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>
  <!-- Logo icon -->
  <rect x="80" y="80" width="56" height="56" rx="14" fill="url(#acc)"/>
  <text x="108" y="118" font-family="Arial" font-size="28" font-weight="900" fill="white" text-anchor="middle">⬡</text>
  <!-- IAForge wordmark -->
  <text x="150" y="122" font-family="Arial Black, Arial" font-size="36" font-weight="900" fill="white">IA</text>
  <text x="194" y="122" font-family="Arial Black, Arial" font-size="36" font-weight="900" fill="url(#acc)">Forge</text>
  <!-- Accent bar -->
  <rect x="80" y="180" width="120" height="3" rx="2" fill="url(#acc)"/>
  <!-- Main headline -->
  <text x="80" y="290" font-family="Arial Black, Arial" font-size="68" font-weight="900" fill="white">Agents IA. SEO. Sites web.</text>
  <text x="80" y="380" font-family="Arial Black, Arial" font-size="68" font-weight="900" fill="url(#acc)">On forge votre avantage.</text>
  <!-- Sub -->
  <text x="80" y="450" font-family="Arial, sans-serif" font-size="28" fill="rgba(200,200,230,0.7)">Déploiement en 3 semaines · ROI +159% à 12 mois · France entière</text>
  <!-- CTA pill -->
  <rect x="80" y="510" width="280" height="52" rx="26" fill="url(#acc)"/>
  <text x="220" y="543" font-family="Arial Black, Arial" font-size="18" font-weight="700" fill="white" text-anchor="middle">Audit gratuit 30 min →</text>
  <!-- Right decoration -->
  <circle cx="960" cy="315" r="200" fill="none" stroke="rgba(124,92,252,0.15)" stroke-width="1"/>
  <circle cx="960" cy="315" r="140" fill="none" stroke="rgba(56,189,248,0.1)" stroke-width="1"/>
  <circle cx="960" cy="315" r="80" fill="none" stroke="rgba(124,92,252,0.2)" stroke-width="2"/>
  <circle cx="960" cy="315" r="8" fill="#7c5cfc"/>
</svg>
